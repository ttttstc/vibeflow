name: "API Standard Engineering"
template: "api-standard"
created_at: "TEMPLATE_DATE"

think:
  depth: "standard"

plan:
  reviews:
    ceo: true
  ceo_mode: "hold"
  specs:
    - id: requirements
      skill: "vibeflow-requirements"
      required: true
    - id: ucd
      skill: "vibeflow-ucd"
      required: false
      skip_when: "no-ui"
    - id: design
      skill: "vibeflow-design"
      required: true

build:
  init_skill: "vibeflow-build-init"
  work_skill: "vibeflow-build-work"
  steps:
    - id: tdd
      skill: "vibeflow-tdd"
      required: true
    - id: quality
      skill: "vibeflow-quality"
      required: true
      gates:
        line_coverage: 90
        branch_coverage: 80
        mutation_score: 80
    - id: feature-st
      skill: "vibeflow-feature-st"
      required: false
    - id: review
      skill: "vibeflow-spec-review"
      required: true

review:
  required: true
  codex: false

test:
  st:
    skill: "vibeflow-test-system"
    required: true
  qa:
    required: false
    skip_when: "no-ui"
  design_review:
    required: false
    skip_when: "no-ui"

ship:
  version_strategy: "semver"
  create_pr: true
  create_tag: true
  document_release: true

reflect:
  required: false
  metrics:
    - "one_pass_rate"
    - "defect_density"
    - "coverage_trend"

quality_gates:
  line_coverage: 90
  branch_coverage: 80
  mutation_score: 80
